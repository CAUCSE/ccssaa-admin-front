# ---------------------------------------------------------------- #
# AI 기본 설정 (언어 및 페르소나)
# ---------------------------------------------------------------- #

# AI가 응답할 때 사용할 기본 언어를 설정합니다. (예: ko-KR, en-US)
language: ko-KR
# AI의 페르소나와 응답 톤앤매너를 상세하게 지시합니다. 최대 250자까지 작성할 수 있습니다.
tone_instructions: >
  당신은 Next.js/React 기반 관리자 대시보드 프로젝트의 코드 리뷰어입니다. 목표는 개발자가 코드 품질을 개선하며 성장하도록 돕는 것입니다.
  1. 피드백은 명확하고 구체적이어야 하며, 문제의 원인과 개선 방법을 반드시 제시하세요.
  2. 리뷰는 교육적이어야 하며, 관련 개념이나 공식 문서를 함께 추천하세요.
  3. 비판보다는 개선 중심의 제안을 우선하세요.
  4. 칭찬은 짧고 위트 있게 작성하세요.

# ---------------------------------------------------------------- #
# 코드 리뷰 기능 세부 설정
# ---------------------------------------------------------------- #
reviews:
  # 리뷰의 전반적인 스타일을 설정합니다. 'chill'은 비교적 덜 엄격하고 부드러운 톤을 의미합니다.
  profile: chill
  # CodeRabbit의 코멘트를 모두 `resolve`하면, 자동으로 Approve를 하는 기능입니다.
  request_changes_workflow: false
  # PR의 전체적인 변경 사항에 대한 고수준의 요약(summary)을 생성할지 여부입니다.
  high_level_summary: true
  # 변경된 각 파일에 대한 요약을 생성할지 여부입니다.
  changed_files_summary: false
  # 코드의 실행 흐름을 보여주는 시퀀스 다이어그램을 생성할지 여부입니다.
  sequence_diagrams: false
  # PR에 연결된 이슈(Issue)를 분석하여 리뷰 컨텍스트에 활용할지 여부입니다.
  assess_linked_issues: true
  # 연관된 다른 이슈를 찾아서 링크할지 여부입니다.
  related_issues: false
  # 연관된 다른 PR을 찾아서 링크할지 여부입니다.
  related_prs: false
  # PR에 적절한 레이블(e.g., 'bug', 'enhancement')을 제안할지 여부입니다.
  suggested_labels: false
  # 제안된 레이블을 자동으로 PR에 적용할지 여부입니다.
  auto_apply_labels: false
  # 이 PR을 리뷰할 만한 적절한 동료 리뷰어를 추천할지 여부입니다.
  suggested_reviewers: false
  # 추천된 리뷰어를 자동으로 할당할지 여부입니다.
  auto_assign_reviewers: false
  # 리뷰 요약에 위트 있는 시(poem)를 포함할지 여부입니다.
  poem: false
  # 특정 파일 경로에 따라 다른 리뷰 지침을 적용합니다.
  path_instructions:
    - path: app/**
      instructions: |
        1. Next.js App Router 및 React(Typescript) 컨벤션, 가독성·안정성(Null/에러 처리)·접근성·라우팅/레이아웃 일관성을 검토해주세요.
        2. .cursor/ui-layout-guidelines.md, .cursor/screen-specs.md 등 프로젝트 스펙을 참고하여 화면/플로우 일치 여부를 확인해 주세요.
        3. 각 리뷰 포인트별로 문제점과 대안을 논리적으로 제시하고, 필요한 경우 예시 코드도 추가해 주세요.
        4. 리뷰가 너무 많아서 피로감을 줄 수 있으니, 꼭 필요한 부분에 집중해주세요.
        5. 리뷰 남겨주는 부분은 해당 라인 범위의 코멘트에 작성해주세요.
    - path: components/**
      instructions: |
        1. React(Typescript) 컴포넌트 설계, 재사용성·가독성·접근성(aria 등), shadcn/ui 등 UI 라이브러리 사용 일관성을 검토해주세요.
        2. .cursor/ui-layout-guidelines.md 및 프로젝트 스타일 가이드를 우선 반영해 주세요.
        3. 각 리뷰 포인트별로 문제점과 대안을 논리적으로 제시하고, 필요한 경우 예시 코드도 추가해 주세요.
        4. 리뷰가 너무 많아서 피로감을 줄 수 있으니, 꼭 필요한 부분에 집중해주세요.
        5. 리뷰 남겨주는 부분은 해당 라인 범위의 코멘트에 작성해주세요.
    - path: lib/**
      instructions: |
        1. API 레이어(lib/api, lib/api/v2), 인증(lib/auth), 유틸(lib/utils)의 가독성·에러 처리·타입 안정성·모듈화를 검토해주세요.
        2. .cursor/develop.md, .cursor/boards-api-v2.md 등 API/개발 스펙과의 일치 여부를 확인해 주세요.
        3. Mock(lib/mock)과 실제 API 호출 경로가 일치하는지, 환경 변수 사용이 적절한지 확인해 주세요.
        4. 각 리뷰 포인트별로 문제점과 대안을 논리적으로 제시하고, 필요한 경우 예시 코드도 추가해 주세요.
        5. 리뷰가 너무 많아서 피로감을 줄 수 있으니, 꼭 필요한 부분에 집중해주세요.
        6. 리뷰 남겨주는 부분은 해당 라인 범위의 코멘트에 작성해주세요.
    - path: hooks/**
      instructions: |
        1. React Query(useQuery/useMutation) 사용, 쿼리 키·무효화·에러 처리·로딩 상태 일관성을 검토해주세요.
        2. 훅의 단일 책임·재사용성·의존성 배열·메모이제이션 필요 여부를 확인해 주세요.
        3. 각 리뷰 포인트별로 문제점과 대안을 논리적으로 제시하고, 필요한 경우 예시 코드도 추가해 주세요.
        4. 리뷰가 너무 많아서 피로감을 줄 수 있으니, 꼭 필요한 부분에 집중해주세요.
        5. 리뷰 남겨주는 부분은 해당 라인 범위의 코멘트에 작성해주세요.
    - path: types/**
      instructions: |
        1. 타입/인터페이스 정의의 일관성·API 응답/요청 스펙과의 일치·null/optional 처리·제네릭 활용을 검토해주세요.
        2. .cursor/develop.md 등 API 스펙 문서와 타입 정의가 맞는지 확인해 주세요.
        3. 각 리뷰 포인트별로 문제점과 대안을 논리적으로 제시해 주세요.
        4. 리뷰가 너무 많아서 피로감을 줄 수 있으니, 꼭 필요한 부분에 집중해주세요.

  # ---------------------------------------------------------------- #
  # 자동 리뷰 트리거 설정 (auto_review)
  # ---------------------------------------------------------------- #
  auto_review:
    # enabled: true이면 PR이 생성될 때 코멘트 없이 자동으로 리뷰가 실행됩니다. false이면 @coderabbitai review 코멘트로만 리뷰를 트리거합니다.
    enabled: true
    # auto_incremental_review: true이면 이미 리뷰된 PR에 새 커밋이 푸시될 때, 변경된 부분만 재리뷰합니다. false이면 증분 리뷰를 하지 않습니다.
    auto_incremental_review: true

# ---------------------------------------------------------------- #
# 채팅 기능 설정
# ---------------------------------------------------------------- #
chat:
  # 사용자가 @coderabbitai 태그를 지정하지 않아도 자동으로 답글을 달 수 있도록 설정합니다.
  auto_reply: true

# ---------------------------------------------------------------- #
# CodeRabbit의 지식 기반(Knowledge Base) 설정
# ---------------------------------------------------------------- #
knowledge_base:
  # 웹 검색을 통해 최신 정보나 문서를 참조할 수 있도록 허용할지 여부입니다.
  web_search:
    enabled: true
  # 레포지토리 내의 특정 파일을 AI의 코드 스타일 가이드라인으로 사용하도록 설정합니다.
  code_guidelines:
    enabled: true
    filePatterns:
      - .cursor/develop.md
      - .cursor/ui-layout-guidelines.md
      - .cursor/screen-specs.md
      - .cursor/boards-api-v2.md
  # CodeRabbit이 대화나 리뷰를 통해 학습한 내용을 어디에 저장하고 참조할지 범위를 설정합니다. 'local'은 현재 레포지토리에 한정됨을 의미합니다.
  learnings:
    scope: local
  # 이슈 정보를 참조할 범위를 설정합니다.
  issues:
    scope: local
  # 풀 리퀘스트 정보를 참조할 범위를 설정합니다.
  pull_requests:
    scope: local
